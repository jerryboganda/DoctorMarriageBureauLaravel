version: 2.1

# ─────────────────────────────────────────────
#  EXECUTORS
# ─────────────────────────────────────────────
executors:
  php_cli:
    docker:
      - image: php:8.3-cli-bullseye
    resource_class: medium
  php_cli_mysql:
    docker:
      - image: php:8.3-cli-bullseye
        environment:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: dmb_test
          DB_USERNAME: root
          DB_PASSWORD: root
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
      - image: cimg/mysql:8.0
        environment:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dmb_test
    resource_class: medium
  node_lts:
    docker:
      - image: cimg/node:22.14
    resource_class: small

# ─────────────────────────────────────────────
#  REUSABLE COMMANDS
# ─────────────────────────────────────────────
commands:
  install_php_system_deps:
    steps:
      - run:
          name: Install PHP system dependencies & Composer
          command: |
            apt-get update -qq
            apt-get install -y --no-install-recommends \
              git unzip zip curl \
              libicu-dev libpng-dev libjpeg62-turbo-dev libfreetype6-dev \
              libonig-dev libxml2-dev libzip-dev libsqlite3-dev sqlite3
            docker-php-ext-configure gd --with-freetype --with-jpeg
            docker-php-ext-install -j"$(nproc)" \
              bcmath exif gd intl mbstring pdo_mysql pdo_sqlite xml zip
            rm -rf /var/lib/apt/lists/*
            curl -sS https://getcomposer.org/installer | \
              php -- --install-dir=/usr/local/bin --filename=composer

  composer_install:
    steps:
      - restore_cache:
          keys:
            - composer-v1-{{ checksum "composer.lock" }}
      - run:
          name: Install Composer dependencies
          command: composer install --no-interaction --prefer-dist --no-progress --no-scripts
      - save_cache:
          key: composer-v1-{{ checksum "composer.lock" }}
          paths:
            - vendor

  npm_ci:
    parameters:
      path:
        type: string
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "<< parameters.path >>/package-lock.json" }}
      - run:
          name: Install npm dependencies
          working_directory: << parameters.path >>
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "<< parameters.path >>/package-lock.json" }}
          paths:
            - << parameters.path >>/node_modules

  frontend_quality_steps:
    parameters:
      path:
        type: string
      build_command:
        type: string
        default: npm run build
    steps:
      - checkout
      - npm_ci:
          path: << parameters.path >>
      - run:
          name: Lint
          working_directory: << parameters.path >>
          command: npm run lint
      - run:
          name: Prettier check
          working_directory: << parameters.path >>
          command: npm run format:check
      - run:
          name: TypeScript check
          working_directory: << parameters.path >>
          command: npm run typecheck
      - run:
          name: Build
          working_directory: << parameters.path >>
          command: << parameters.build_command >>

# ─────────────────────────────────────────────
#  JOBS
# ─────────────────────────────────────────────
jobs:

  # ── GATE JOB ──────────────────────────────
  # The ONLY job that blocks production deploy.
  # Fast: PHP lint + PHPStan + unit tests (SQLite in-memory, no DB spin-up).
  # Typical runtime: 2-4 minutes.
  backend_quality:
    executor: php_cli
    steps:
      - checkout
      - install_php_system_deps
      - run:
          name: Prepare environment
          command: cp .env.example .env
      - composer_install
      - run:
          name: Generate app key & discover packages
          command: |
            php artisan key:generate --no-interaction
            php artisan package:discover
      - run:
          name: Backend CI (lint + analyse + tests)
          command: composer ci:backend

  # ── NON-BLOCKING JOBS ──────────────────────
  # These run in parallel for visibility and catch regressions,
  # but they do NOT block the production deploy.

  backend_mysql_smoke:
    executor: php_cli_mysql
    steps:
      - checkout
      - install_php_system_deps
      - run:
          name: Prepare environment
          command: cp .env.example .env
      - composer_install
      - run:
          name: Generate app key & discover packages
          command: |
            php artisan key:generate --no-interaction
            php artisan package:discover
      - run:
          name: Wait for MySQL
          command: |
            for i in $(seq 1 60); do
              php -r 'new PDO("mysql:host=127.0.0.1;port=3306;dbname=dmb_test","root","root");' \
                && exit 0 || true
              sleep 2
            done
            exit 1
      - run:
          name: Import baseline schema
          command: php ci_import_test_schema.php
      - run:
          name: Migrate + regression smoke
          command: |
            php artisan migrate --force
            php artisan test --testsuite=Feature --filter=BackendApiRegressionTest

  admin_frontend_quality:
    executor: node_lts
    steps:
      - frontend_quality_steps:
          path: Admin Panel Frontend

  user_frontend_quality:
    executor: node_lts
    steps:
      - frontend_quality_steps:
          path: New User Panel Frontend

  mobile_web_quality:
    executor: node_lts
    steps:
      - frontend_quality_steps:
          path: DMB Mobile App
          build_command: npm run build:web

  # ── DEPLOY ────────────────────────────────
  # Runs immediately after backend_quality passes on main.
  # Uses smart path-based logic on the VPS: only rebuilds
  # Docker services whose source files actually changed.
  deploy_production:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - checkout

      - add_ssh_keys

      - run:
          name: Add VPS host key
          command: |
            if [ -z "$VPS_HOST" ]; then echo "VPS_HOST is required"; exit 1; fi
            mkdir -p ~/.ssh
            ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - run:
          name: Transfer code bundle to VPS
          command: |
            if [ -z "$VPS_HOST" ]; then echo "VPS_HOST is required"; exit 1; fi
            if [ -z "$VPS_USER" ]; then echo "VPS_USER is required"; exit 1; fi
            git bundle create /tmp/dmb-main.bundle HEAD
            scp /tmp/dmb-main.bundle "$VPS_USER@$VPS_HOST:/tmp/dmb-main.bundle"

      - run:
          name: Deploy on VPS
          no_output_timeout: 20m
          command: |
            if [ -z "$VPS_HOST" ]; then echo "VPS_HOST is required"; exit 1; fi
            if [ -z "$VPS_USER" ]; then echo "VPS_USER is required"; exit 1; fi
            if [ -z "$DEPLOY_PATH" ]; then echo "DEPLOY_PATH is required"; exit 1; fi
            scp deploy/circleci-remote-deploy.sh "$VPS_USER@$VPS_HOST:/tmp/dmb-circleci-remote-deploy.sh"
            ssh "$VPS_USER@$VPS_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash /tmp/dmb-circleci-remote-deploy.sh"

      - run:
          name: Production health check
          command: |
            echo "Waiting 15s for services to stabilise..."
            sleep 15
            curl -fsS --retry 3 --retry-delay 5 -o /dev/null \
              https://api.doctormarriagebureau.com.pk/
            curl -fsS --retry 3 --retry-delay 5 -o /dev/null \
              https://api.doctormarriagebureau.com.pk/api/health
            curl -fsS --retry 3 --retry-delay 5 -o /dev/null \
              https://api.doctormarriagebureau.com.pk/admin
            curl -fsS --retry 3 --retry-delay 5 -o /dev/null \
              https://api.doctormarriagebureau.com.pk/admin-react/login
            curl -fsS --retry 3 --retry-delay 5 -o /dev/null \
              https://panel.doctormarriagebureau.com.pk/
            curl -fsS --retry 3 --retry-delay 5 -o /dev/null \
              https://soketi.polytronx.com/
            echo "==> All production endpoints healthy"

# ─────────────────────────────────────────────
#  WORKFLOW
# ─────────────────────────────────────────────
workflows:
  quality_and_deploy:
    jobs:
      # ── Sole blocking gate for deploy ──────
      - backend_quality

      # ── Deploy: fires as soon as backend_quality passes on main ──
      - deploy_production:
          requires:
            - backend_quality
          filters:
            branches:
              only: main

      # ── Non-blocking jobs: run in parallel for signal, never delay deploy ──
      - backend_mysql_smoke
      - admin_frontend_quality
      - user_frontend_quality
      - mobile_web_quality
