name: dmb_mobile_app
description: "DMB - Doctor Marriage Bureau: A specialized matchmaking platform for medical professionals"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Networking
  http: ^1.2.1
  dio: ^5.4.3
  
  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  
  # UI Components
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  
  # Form & Validation
  flutter_form_builder: ^9.2.1
  form_builder_validators: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  go_router_builder: ^2.4.1
  
  # Testing
  mocktail: ^1.0.3
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  
  # Assets will be added when font files are available
  # For now using system fonts
