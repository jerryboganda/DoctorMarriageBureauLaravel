name: dmb_app
description: Doctor Marriage Bureau - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP & Networking
  dio: ^5.4.3+1

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Real-time (disable pusher for web build - uses soketi websocket)
  # pusher_channels_flutter: ^2.3.1

  # Push Notifications (disable for web build - uncomment after adding google-services.json)
  # firebase_core: ^3.1.0
  # firebase_messaging: ^15.0.1

  # Social Login (disable for web build - uncomment after setup)
  # google_sign_in: ^6.2.1

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  # flutter_image_compress: ^2.3.0  # Not supported on web — enable for mobile builds only

  # Icons (Lucide parity)
  lucide_icons: ^0.257.0

  # PDF Generation
  pdf: ^3.11.0
  printing: ^5.13.1

  # Sharing
  share_plus: ^9.0.0

  # i18n
  intl: ^0.19.0

  # URL Launcher
  url_launcher: ^6.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Shimmer loading
  shimmer: ^3.0.0

  # JSON Serialization
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansArabic/NotoSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansArabic/NotoSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansArabic/NotoSansArabic-Bold.ttf
          weight: 700
