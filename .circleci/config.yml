version: 2.1

executors:
  php_cli:
    docker:
      - image: php:8.3-cli-bullseye
    resource_class: small
  php_cli_mysql:
    docker:
      - image: php:8.3-cli-bullseye
        environment:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: dmb_test
          DB_USERNAME: root
          DB_PASSWORD: root
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
      - image: cimg/mysql:8.0
        environment:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dmb_test
    resource_class: small
  node_lts:
    docker:
      - image: cimg/node:22.14
    resource_class: small

commands:
  install_php_system_deps:
    steps:
      - run:
          name: Install PHP system dependencies
          command: |
            apt-get update
            apt-get install -y --no-install-recommends \
              git unzip zip curl \
              libicu-dev libpng-dev libjpeg62-turbo-dev libfreetype6-dev \
              libonig-dev libxml2-dev libzip-dev libsqlite3-dev sqlite3
            docker-php-ext-configure gd --with-freetype --with-jpeg
            docker-php-ext-install -j"$(nproc)" bcmath exif gd intl mbstring pdo_mysql pdo_sqlite xml zip
            rm -rf /var/lib/apt/lists/*
      - run:
          name: Install Composer
          command: |
            curl -sS https://getcomposer.org/installer -o /tmp/composer-setup.php
            php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
            composer --version
  npm_ci:
    parameters:
      path:
        type: string
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "<< parameters.path >>/package-lock.json" }}
      - run:
          name: Install npm dependencies
          working_directory: << parameters.path >>
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "<< parameters.path >>/package-lock.json" }}
          paths:
            - << parameters.path >>/node_modules
  frontend_quality_steps:
    parameters:
      path:
        type: string
      build_command:
        type: string
        default: npm run build
    steps:
      - checkout
      - npm_ci:
          path: << parameters.path >>
      - run:
          name: Lint
          working_directory: << parameters.path >>
          command: npm run lint
      - run:
          name: Prettier check
          working_directory: << parameters.path >>
          command: npm run format:check
      - run:
          name: TypeScript check
          working_directory: << parameters.path >>
          command: npm run typecheck
      - run:
          name: Build
          working_directory: << parameters.path >>
          command: << parameters.build_command >>

jobs:
  backend_quality:
    executor: php_cli
    steps:
      - checkout
      - install_php_system_deps
      - run:
          name: Prepare environment file
          command: cp .env.example .env
      - restore_cache:
          keys:
            - composer-v1-{{ checksum "composer.lock" }}
      - run:
          name: Install Composer dependencies
          command: composer install --no-interaction --prefer-dist --no-progress
      - save_cache:
          key: composer-v1-{{ checksum "composer.lock" }}
          paths:
            - vendor
      - run:
          name: Generate application key
          command: php artisan key:generate --no-interaction
      - run:
          name: Backend CI
          command: composer ci:backend

  backend_mysql_smoke:
    executor: php_cli_mysql
    steps:
      - checkout
      - install_php_system_deps
      - run:
          name: Prepare environment file
          command: cp .env.example .env
      - restore_cache:
          keys:
            - composer-v1-{{ checksum "composer.lock" }}
      - run:
          name: Install Composer dependencies
          command: composer install --no-interaction --prefer-dist --no-progress
      - run:
          name: Generate application key
          command: php artisan key:generate --no-interaction
      - run:
          name: Wait for MySQL
          command: |
            for i in $(seq 1 60); do
              php -r 'new PDO("mysql:host=127.0.0.1;port=3306;dbname=dmb_test", "root", "root");' && exit 0
              sleep 2
            done
            exit 1
      - run:
          name: Migration-backed API smoke
          command: |
            php artisan migrate --force
            php artisan test --testsuite=Feature --filter=BackendApiRegressionTest

  admin_frontend_quality:
    executor: node_lts
    steps:
      - frontend_quality_steps:
          path: Admin Panel Frontend

  user_frontend_quality:
    executor: node_lts
    steps:
      - frontend_quality_steps:
          path: New User Panel Frontend

  mobile_web_quality:
    executor: node_lts
    steps:
      - frontend_quality_steps:
          path: DMB Mobile App
          build_command: npm run build:web

  compose_validate:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Validate Docker Compose
          command: |
            export DB_PASSWORD=ci-dummy
            export DB_ROOT_PASSWORD=ci-dummy
            docker compose config --quiet

  deploy_production:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - checkout
      - add_ssh_keys
      - run:
          name: Add VPS host key
          command: |
            : "${VPS_HOST:?VPS_HOST is required}"
            mkdir -p ~/.ssh
            ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
      - run:
          name: Deploy to production VPS
          command: |
            : "${VPS_HOST:?VPS_HOST is required}"
            : "${VPS_USER:?VPS_USER is required}"
            : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
            git bundle create /tmp/dmb-main.bundle HEAD
            scp /tmp/dmb-main.bundle "$VPS_USER@$VPS_HOST:/tmp/dmb-main.bundle"
            ssh "$VPS_USER@$VPS_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" \<<'REMOTE'
            set -euo pipefail
            cd "$DEPLOY_PATH"
            git fetch /tmp/dmb-main.bundle HEAD
            git reset --hard FETCH_HEAD
            git update-ref refs/remotes/origin/main HEAD
            rm -f /tmp/dmb-main.bundle
            if [ -L dmb_app ]; then rm dmb_app; fi
            git status --short --branch
            docker compose config --quiet
            docker compose up -d --build app web frontend soketi db
            docker compose restart web
            for i in $(seq 1 30); do
              if docker ps --filter name=marriagebureau-db --format '{{.Status}}' | grep -q healthy; then
                break
              fi
              sleep 5
            done
            docker ps --filter 'name=marriagebureau' --format '{{.Names}}|{{.Status}}'
            REMOTE
      - run:
          name: Verify production routes
          command: |
            set -e
            curl -fsS -o /dev/null https://api.doctormarriagebureau.com.pk/
            curl -fsS -o /dev/null https://panel.doctormarriagebureau.com.pk/
            curl -fsS -o /dev/null https://soketi.polytronx.com/

workflows:
  quality_and_deploy:
    jobs:
      - backend_quality
      - backend_mysql_smoke
      - admin_frontend_quality
      - user_frontend_quality
      - mobile_web_quality
      - compose_validate
      - deploy_production:
          requires:
            - backend_quality
            - backend_mysql_smoke
            - admin_frontend_quality
            - user_frontend_quality
            - mobile_web_quality
            - compose_validate
          filters:
            branches:
              only:
                - main
